<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" shape-rendering="crispEdges">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0c0c24"/>
      <stop offset="100%" stop-color="#040410"/>
    </radialGradient>
    <linearGradient id="g" gradientUnits="userSpaceOnUse" x1="106" y1="128" x2="294" y2="240">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#d4e4ff"/>
      <stop offset="100%" stop-color="#6688cc"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="aura" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="soft" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Colorful aura layers -->
  <g shape-rendering="auto">
    <ellipse cx="155" cy="190" rx="105" ry="80" fill="#4422aa" opacity="0.22" filter="url(#aura)"/>
    <ellipse cx="255" cy="175" rx="95" ry="70" fill="#006688" opacity="0.18" filter="url(#aura)"/>
    <ellipse cx="200" cy="230" rx="110" ry="65" fill="#1a2266" opacity="0.15" filter="url(#aura)"/>
    <ellipse cx="230" cy="145" rx="70" ry="50" fill="#881155" opacity="0.12" filter="url(#aura)"/>
  </g>

  <!-- Stars -->
  <g fill="#fff">
    <rect x="18" y="12" width="2" height="2" opacity="0.55"/>
    <rect x="72" y="8" width="1" height="1" opacity="0.5"/>
    <rect x="140" y="22" width="2" height="2" opacity="0.35"/>
    <rect x="195" y="10" width="1" height="1" opacity="0.4"/>
    <rect x="260" y="18" width="2" height="2" opacity="0.3"/>
    <rect x="310" y="6" width="1" height="1" opacity="0.55"/>
    <rect x="365" y="22" width="2" height="2" opacity="0.25"/>
    <rect x="388" y="14" width="1" height="1" opacity="0.35"/>
    <rect x="42" y="44" width="1" height="1" opacity="0.3"/>
    <rect x="168" y="38" width="1" height="1" opacity="0.25"/>
    <rect x="332" y="40" width="1" height="1" opacity="0.4"/>
    <rect x="22" y="78" width="1" height="1" opacity="0.3"/>
    <rect x="380" y="82" width="1" height="1" opacity="0.2"/>
    <rect x="12" y="165" width="1" height="1" opacity="0.3"/>
    <rect x="388" y="180" width="1" height="1" opacity="0.25"/>
    <rect x="8" y="260" width="1" height="1" opacity="0.25"/>
    <rect x="392" y="250" width="1" height="1" opacity="0.2"/>
    <rect x="18" y="340" width="1" height="1" opacity="0.3"/>
    <rect x="385" y="350" width="1" height="1" opacity="0.2"/>
    <rect x="48" y="380" width="1" height="1" opacity="0.2"/>
    <rect x="360" y="385" width="1" height="1" opacity="0.15"/>
    <rect x="155" y="390" width="1" height="1" opacity="0.15"/>
    <rect x="250" y="388" width="1" height="1" opacity="0.12"/>
  </g>
  <rect x="95" y="30" width="2" height="2" fill="#ffc888" opacity="0.3"/>
  <rect x="285" y="48" width="2" height="2" fill="#aabbee" opacity="0.22"/>
  <rect x="355" y="360" width="2" height="2" fill="#ffc888" opacity="0.18"/>
  <rect x="52" y="200" width="2" height="2" fill="#bbccff" opacity="0.2"/>

  <!-- Shooting stars -->
  <g opacity="0.18" fill="#fff">
    <rect x="302" y="38" width="4" height="1"/>
    <rect x="306" y="39" width="3" height="1"/>
    <rect x="309" y="40" width="2" height="1"/>
    <rect x="311" y="41" width="1" height="1"/>
  </g>
  <g opacity="0.12" fill="#fff">
    <rect x="58" y="320" width="3" height="1"/>
    <rect x="61" y="321" width="2" height="1"/>
    <rect x="63" y="322" width="1" height="1"/>
  </g>

  <!-- Ambient glow behind 42 -->
  <ellipse cx="200" cy="184" rx="95" ry="58" fill="#161650" opacity="0.25" filter="url(#soft)" shape-rendering="auto"/>

  <!-- Pixel 42 (centered at canvas center) -->
  <g fill="url(#g)" filter="url(#glow)">
    <!-- 4 -->
    <rect x="106" y="128" width="16" height="16"/>
    <rect x="170" y="128" width="16" height="16"/>
    <rect x="106" y="144" width="16" height="16"/>
    <rect x="170" y="144" width="16" height="16"/>
    <rect x="106" y="160" width="16" height="16"/>
    <rect x="170" y="160" width="16" height="16"/>
    <rect x="106" y="176" width="16" height="16"/>
    <rect x="122" y="176" width="16" height="16"/>
    <rect x="138" y="176" width="16" height="16"/>
    <rect x="154" y="176" width="16" height="16"/>
    <rect x="170" y="176" width="16" height="16"/>
    <rect x="170" y="192" width="16" height="16"/>
    <rect x="170" y="208" width="16" height="16"/>
    <rect x="170" y="224" width="16" height="16"/>
    <!-- 2 -->
    <rect x="214" y="128" width="16" height="16"/>
    <rect x="230" y="128" width="16" height="16"/>
    <rect x="246" y="128" width="16" height="16"/>
    <rect x="262" y="128" width="16" height="16"/>
    <rect x="278" y="128" width="16" height="16"/>
    <rect x="278" y="144" width="16" height="16"/>
    <rect x="278" y="160" width="16" height="16"/>
    <rect x="214" y="176" width="16" height="16"/>
    <rect x="230" y="176" width="16" height="16"/>
    <rect x="246" y="176" width="16" height="16"/>
    <rect x="262" y="176" width="16" height="16"/>
    <rect x="278" y="176" width="16" height="16"/>
    <rect x="214" y="192" width="16" height="16"/>
    <rect x="214" y="208" width="16" height="16"/>
    <rect x="214" y="224" width="16" height="16"/>
    <rect x="230" y="224" width="16" height="16"/>
    <rect x="246" y="224" width="16" height="16"/>
    <rect x="262" y="224" width="16" height="16"/>
    <rect x="278" y="224" width="16" height="16"/>
  </g>

  <!-- Accent line -->
  <rect x="170" y="252" width="60" height="1" fill="#4466aa" opacity="0.2" shape-rendering="auto"/>

  <!-- Text -->
  <text x="200" y="276" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" fill="#4a5580" letter-spacing="4" shape-rendering="geometricPrecision">TOKENIZE ART</text>
  <text x="200" y="298" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#343860" shape-rendering="geometricPrecision">by keokim</text>

  <!-- Floating dust -->
  <g fill="#8899cc">
    <rect x="120" y="330" width="2" height="2" opacity="0.07"/>
    <rect x="200" y="345" width="2" height="2" opacity="0.06"/>
    <rect x="280" y="335" width="2" height="2" opacity="0.06"/>
    <rect x="160" y="365" width="2" height="2" opacity="0.05"/>
    <rect x="240" y="370" width="2" height="2" opacity="0.05"/>
  </g>
</svg>
